<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sign up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body class="login-body">
<script type="text/javascript">
	function checkId(){
		
	}
</script>
<div class="login-card">
    <div class="login-header">
        <h2>Sign up</h2>
        <p>Enter Employee Information</p>
    </div>

    <form>
        <!-- 사원번호 -->
        <div class="form-section mb-3">
            <label class="form-label">Employee ID</label>
            <div class="input-group">
                <input id="EMP_NO" type="text" class="form-control" placeholder="Enter your Employee ID">
                <button type="button" class="btn btn-outline-primary" onclick="checkId()">Check Status</button>
            </div>
        </div>

        <!-- 이름 -->
        <div class="form-section mb-3">
            <label class="form-label">Name</label>
            <input id ="EMP_NAME"type="text" class="form-control" placeholder="name" disabled="disabled">
        </div>
        <!-- 부서 -->
        <div class="form-section mb-3">
            <label class="form-label">Dept</label>
            <input id="DEPT_CODE" stype="text" class="form-control" placeholder="dept" disabled="disabled">
        </div>

        <!-- 비밀번호 -->
        <div class="form-section mb-4">
            <label class="form-label">PW</label>
            <input id = "EMP_PW" type="password" class="form-control" placeholder="Enter your pw">
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary w-50">Sign up</button>
            <button type="button" class="btn btn-secondary w-50" onclick="history.back()">back</button>
        </div>
    </form>
</div>

</body>
</html>
