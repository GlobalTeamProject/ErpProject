<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 커스텀 CSS (반드시 Bootstrap 아래에 위치) -->
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body class="login-body">

    <div class="login-card">
        <div class="login-header">
            <h2>ERP System</h2>
            <p>Enter your ID/PW</p>
        </div>
        
        <form action="/login" method="post">
            <!-- Bootstrap 클래스 적용 -->
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter your ID" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter your pwd" required>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 mt-2">Login</button>
        </form>

        <div class="login-footer mt-4 text-center">
            <p>Forgot your ID/PW?<br>
                <a th:href="@{/findId}">Find your ID</a> | 
                <a th:href="@{/findPw}">Find your PW</a> |  
                <a th:href="@{/sign}">Sign up</a>
            </p>
        </div>
    </div>

</body>
</html>
